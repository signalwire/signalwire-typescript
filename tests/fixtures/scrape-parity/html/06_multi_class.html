<!DOCTYPE html>
<html>
<head><title>Multi-class</title></head>
<body>
  <main>
    <div class="wrapper sidebar-menu promoted">
      This div has three classes. One of them (sidebar-menu) matches the sidebar pattern.
    </div>
    <div class="content main-section">
      <h1>Kept Content</h1>
      <p>This div has classes content and main-section. Neither matches a noise pattern so the element survives.</p>
    </div>
    <div class="banner-wrapper">
      Banner class should be removed by the banner pattern filter.
    </div>
  </main>
</body>
</html>
