<!DOCTYPE html>
<html>
<body>
  <main>
    <!-- This is a comment and should not appear in text output -->
    <p>Paragraph before the comment.</p>
    <!-- nested <p>fake paragraph</p> inside comment -->
    <p>Paragraph after the comment.</p>
    <![CDATA[This is CDATA content; parsers disagree whether this ends up in text.]]>
    <p>Last paragraph to give enough text above the 100-char selector threshold.</p>
  </main>
</body>
</html>
